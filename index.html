<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Mental - Markmap POC</title>
  <style>
    :root {
      --pink: #E91E8C;
      --pink-light: #FCE4EC;
      --pink-lighter: #FFF0F5;
      --pink-border: #F8BBD0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f8f9fa; 
      overflow: hidden; 
    }
    #app {
      display: flex;
      height: 100vh;
    }

    /* Editor Panel */
    #editor {
      width: 320px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
      background: #fff;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
    }
    #editor.collapsed {
      width: 44px;
      min-width: 44px;
    }
    #editor h2 {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 0;
    }
    #editor.collapsed h2 {
      padding: 10px 8px;
      justify-content: center;
    }
    #editor.collapsed h2 span { display: none; }
    #editor.collapsed textarea { opacity: 0; pointer-events: none; }
    #btn-toggle-panel {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: transparent;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #btn-toggle-panel:hover { background: var(--pink-light); color: var(--pink); }
    textarea {
      flex: 1;
      padding: 12px;
      border: none;
      resize: none;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      line-height: 1.6;
      outline: none;
      color: #333;
    }

    /* Map Container */
    #map-container {
      flex: 1;
      position: relative;
      background: #f8f9fa;
    }
    svg#mindmap {
      width: 100%;
      height: 100%;
    }

    /* Tema rosa para o markmap */
    .markmap {
      --markmap-a-color: var(--pink);
    }
    .markmap-link {
      stroke: var(--pink) !important;
    }
    .markmap-node > line {
      stroke: var(--pink) !important;
    }
    .markmap-node > circle {
      stroke: var(--pink) !important;
    }

    /* Bottom Toolbar */
    #toolbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 10;
    }
    #toolbar .separator {
      width: 1px;
      height: 24px;
      background: #e0e0e0;
      margin: 0 8px;
    }
    #toolbar button {
      height: 32px;
      padding: 0 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #555;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    #toolbar button:hover {
      background: var(--pink-light);
      color: var(--pink);
    }
    #toolbar button.active {
      background: var(--pink-light);
      color: var(--pink);
    }
    #toolbar button.icon-only {
      width: 32px;
      padding: 0;
      justify-content: center;
    }
    #toolbar button :is(svg, .lucide),
    #searchbar :is(svg, .lucide),
    #btn-toggle-panel :is(svg, .lucide) {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    #btn-toggle-panel :is(svg, .lucide) {
      width: 16px;
      height: 16px;
    }
    #zoom-display {
      min-width: 45px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #666;
    }

    /* Search bar */
    #searchbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 8px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    #searchbar input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 200px;
      color: #333;
      background: transparent;
    }
    #searchbar input::placeholder { color: #999; }
    #searchbar input.no-match { color: #dc3545; }
    #search-counter {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      min-width: 45px;
      text-align: center;
    }
    #searchbar button {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: #f5f5f5;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #searchbar button:hover { background: var(--pink-light); color: var(--pink); }

    /* Search highlight */
    #map-container.searching .markmap-node { opacity: 0.25; }
    #map-container.searching .markmap-node.search-active { opacity: 1; }
    #map-container.searching .markmap-link { opacity: 0.15; }

    /* Dark mode */
    body.dark { background: #1a1a2e; }
    body.dark #editor { background: #1e1e2e; border-color: #333; }
    body.dark #editor h2 { background: #181825; color: #aaa; border-color: #333; }
    body.dark #btn-toggle-panel { color: #888; border-color: #444; }
    body.dark #btn-toggle-panel:hover { background: #2d2d44; }
    body.dark textarea { background: #1e1e2e; color: #cdd6f4; }
    body.dark #map-container { background: #1a1a2e; }
    body.dark #toolbar { background: #252536; border-color: #333; }
    body.dark #toolbar .separator { background: #444; }
    body.dark #toolbar button { color: #cdd6f4; }
    body.dark #toolbar button:hover { background: #3d3d55; }
    body.dark #zoom-display { color: #aaa; }
    body.dark #searchbar {
      background: #252536;
      border-color: #333;
      color-scheme: dark;
    }
    body.dark #searchbar input {
      color: #cdd6f4;
      background: transparent;
    }
    body.dark #searchbar input::placeholder { color: #6c7086; }
    body.dark #search-counter { color: #a6adc8; }
    body.dark #searchbar :is(svg, .lucide) { color: #cdd6f4; }
    body.dark #searchbar button { background: #3d3d55; color: #cdd6f4; }
    body.dark #searchbar button:hover { background: #4a4a6a; color: #f5c2e0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="editor">
      <h2>
        <span>Markdown</span>
        <button id="btn-toggle-panel" class="icon-only" onclick="togglePanel()" title="Retrair painel" type="button">
          <i data-lucide="chevron-left"></i>
        </button>
      </h2>
      <textarea id="md-input" spellcheck="false">
# Mapa Mental

## Tecnologia
- Frontend
  - React
  - Vue
  - Svelte
- Backend
  - Node.js
  - Python
  - Go

## Aprendizado
- Livros
- Cursos online
- Projetos práticos

## Metas 2026
- Lançar produto
- Contribuir open source
- Aprender Rust
      </textarea>
    </div>
    <div id="map-container">
      <svg id="mindmap"></svg>
      
      <div id="searchbar">
        <i data-lucide="search"></i>
        <input id="search-input" type="text" placeholder="Buscar..." autocomplete="off" />
        <span id="search-counter"></span>
        <button type="button" onclick="searchPrev()" title="Anterior (Shift+Enter)"><i data-lucide="chevron-up"></i></button>
        <button type="button" onclick="searchNext()" title="Próximo (Enter)"><i data-lucide="chevron-down"></i></button>
        <button type="button" onclick="closeSearch()" title="Fechar (Esc)"><i data-lucide="x"></i></button>
      </div>
      
      <div id="toolbar">
        <button type="button" class="icon-only" onclick="openSearch()" title="Buscar (Ctrl+F)">
          <i data-lucide="search"></i>
        </button>
        
        <div class="separator"></div>
        
        <button type="button" class="icon-only" onclick="zoomOut()" title="Diminuir zoom">
          <i data-lucide="minus"></i>
        </button>
        <span id="zoom-display">100%</span>
        <button type="button" class="icon-only" onclick="zoomIn()" title="Aumentar zoom">
          <i data-lucide="plus"></i>
        </button>
        <button type="button" class="icon-only" onclick="fitView()" title="Ajustar à tela">
          <i data-lucide="crosshair"></i>
        </button>
        
        <div class="separator"></div>
        
        <button type="button" onclick="expandAll()" title="Expandir todos os ramos">
          <i data-lucide="unfold-vertical"></i>
          Abrir tudo
        </button>
        <button type="button" onclick="collapseAll()" title="Recolher todos os ramos">
          <i data-lucide="fold-vertical"></i>
          Recolher tudo
        </button>
        
        <div class="separator"></div>
        
        <button type="button" class="icon-only" id="btn-layout" onclick="toggleLayout()" title="Ambos os lados">
          <i data-lucide="columns-2"></i>
        </button>
        <button type="button" class="icon-only" id="btn-dark" onclick="toggleDark()" title="Modo escuro">
          <i data-lucide="moon"></i>
        </button>
        <button type="button" class="icon-only" onclick="downloadPng()" title="Baixar PNG">
          <i data-lucide="download"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18"></script>
  <script src="markmap-src/packages/markmap-view/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    function refreshLucideIcons() {
      if (window.lucide) lucide.createIcons();
    }

    /** Lucide troca <i> por <svg>; use isto para atualizar ícones em botões. */
    function setLucideIcon(container, iconName) {
      container.replaceChildren();
      const icon = document.createElement('i');
      icon.setAttribute('data-lucide', iconName);
      container.appendChild(icon);
      if (window.lucide) lucide.createIcons({ root: container });
    }

    const { Transformer } = window.markmap;
    const { Markmap, loadCSS, loadJS } = window.markmap;

    const transformer = new Transformer();
    const svg = document.getElementById('mindmap');
    let mm = Markmap.create(svg, { 
      bidirectional: true, 
      autoFit: true,
      color: () => '#E91E8C'
    });

    let layoutBoth = true;

    function syncZoom() {
      const transform = d3.zoomTransform(svg);
      document.getElementById('zoom-display').textContent = Math.round(transform.k * 100) + '%';
    }

    mm.zoom.on('zoom.display', syncZoom);

    function zoomIn() {
      mm.rescale(1.25);
      setTimeout(syncZoom, 50);
    }

    function zoomOut() {
      mm.rescale(0.8);
      setTimeout(syncZoom, 50);
    }

    function fitView() {
      mm.fit();
      setTimeout(syncZoom, 300);
    }

    function update() {
      const md = document.getElementById('md-input').value;
      const { root, features } = transformer.transform(md);
      const { styles, scripts } = transformer.getUsedAssets(features);
      if (styles) loadCSS(styles);
      if (scripts) loadJS(scripts, { getMarkmap: () => window.markmap });
      mm.setData(root, { bidirectional: layoutBoth });
      mm.fit();
      setTimeout(syncZoom, 300);
    }

    function clearAllFoldState(node) {
      if (!node) return;
      if (node.payload) {
        const { fold, foldLeft, foldRight, ...rest } = node.payload;
        node.payload = Object.keys(rest).length ? rest : undefined;
      }
      node.children?.forEach(clearAllFoldState);
    }

    function toggleLayout() {
      layoutBoth = !layoutBoth;
      if (mm.state.data) clearAllFoldState(mm.state.data);
      const btn = document.getElementById('btn-layout');
      setLucideIcon(btn, layoutBoth ? 'columns-2' : 'panel-right');
      btn.title = layoutBoth ? 'Ambos os lados' : 'Somente direita';
      btn.classList.toggle('active', !layoutBoth);
      mm.setOptions({ bidirectional: layoutBoth });
      mm.renderData();
      mm.fit();
    }

    function expandAll() {
      if (!mm.state.data) return;
      clearAllFoldState(mm.state.data);
      mm.renderData();
      mm.fit();
    }

    function collapseAll() {
      if (!mm.state.data) return;
      const root = mm.state.data;
      if (layoutBoth) {
        root.payload = { ...(root.payload || {}), foldLeft: 1, foldRight: 1 };
      } else {
        // No modo unilateral, fold: 1 na raiz esconde todos os filhos
        root.payload = { ...(root.payload || {}), fold: 1 };
      }
      mm.renderData();
      mm.fit();
    }

    // Dark mode
    let isDark = false;
    function toggleDark() {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
      document.getElementById('map-container').classList.toggle('markmap-dark', isDark);
      const btnDark = document.getElementById('btn-dark');
      setLucideIcon(btnDark, isDark ? 'sun' : 'moon');
      btnDark.title = isDark ? 'Modo claro' : 'Modo escuro';
    }

    // Search
    let searchMatches = [];
    let searchIndex = -1;

    function nodeText(node) {
      const tmp = document.createElement('div');
      tmp.innerHTML = node.content || '';
      return tmp.textContent;
    }

    function collectAllNodes(node, result = []) {
      result.push(node);
      if (node.children) node.children.forEach(c => collectAllNodes(c, result));
      return result;
    }

    function unfoldPath(target) {
      function walk(node) {
        if (node === target) return true;
        if (!node.children) return false;
        for (const child of node.children) {
          if (walk(child)) {
            node.payload = { ...(node.payload || {}), fold: 0, foldLeft: 0, foldRight: 0 };
            return true;
          }
        }
        return false;
      }
      walk(mm.state.data);
    }

    function clearSearchFocus() {
      document.getElementById('map-container').classList.remove('searching');
      document.querySelectorAll('.markmap-node.search-active').forEach(el => el.classList.remove('search-active'));
    }

    function applySearchFocus(node) {
      document.querySelectorAll('.markmap-node.search-active').forEach(el => el.classList.remove('search-active'));
      const found = mm.findElement(node);
      if (found) found.g.classList.add('search-active');
      document.getElementById('map-container').classList.add('searching');
    }

    async function navigateToMatch() {
      if (!searchMatches.length) {
        clearSearchFocus();
        mm.setHighlight(null);
        updateCounter();
        return;
      }
      const node = searchMatches[searchIndex];
      unfoldPath(node);
      mm.setOptions({ autoFit: false });
      await mm.setHighlight(node);
      mm.setOptions({ autoFit: true });
      applySearchFocus(node);
      mm.centerNode(node);
      updateCounter();
    }

    function runSearch(query) {
      const q = query.trim().toLowerCase();
      const input = document.getElementById('search-input');
      if (!q) {
        searchMatches = [];
        searchIndex = -1;
        input.classList.remove('no-match');
        clearSearchFocus();
        mm.setHighlight(null);
        updateCounter();
        return;
      }
      searchMatches = collectAllNodes(mm.state.data).filter(n => nodeText(n).toLowerCase().includes(q));
      searchIndex = searchMatches.length ? 0 : -1;
      input.classList.toggle('no-match', searchMatches.length === 0);
      navigateToMatch();
    }

    function searchNext() {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex + 1) % searchMatches.length;
      navigateToMatch();
    }

    function searchPrev() {
      if (!searchMatches.length) return;
      searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
      navigateToMatch();
    }

    function updateCounter() {
      const el = document.getElementById('search-counter');
      const q = document.getElementById('search-input').value.trim();
      el.textContent = q ? (searchMatches.length ? `${searchIndex + 1}/${searchMatches.length}` : '0/0') : '';
    }

    function openSearch() {
      document.getElementById('searchbar').style.display = 'flex';
      document.getElementById('search-input').focus();
      refreshLucideIcons();
    }

    function closeSearch() {
      document.getElementById('searchbar').style.display = 'none';
      document.getElementById('search-input').value = '';
      searchMatches = [];
      searchIndex = -1;
      clearSearchFocus();
      mm.setHighlight(null);
      updateCounter();
    }

    document.getElementById('search-input').addEventListener('input', e => runSearch(e.target.value));
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.shiftKey ? searchPrev() : searchNext(); }
      if (e.key === 'Escape') closeSearch();
    });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        openSearch();
      }
    });

    // Download PNG
    function downloadPng() {
      const svgEl = svg.cloneNode(true);
      const { width, height } = svg.getBoundingClientRect();
      svgEl.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svgEl.setAttribute('width', width * 2);
      svgEl.setAttribute('height', height * 2);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
      
      const svgData = new XMLSerializer().serializeToString(svgEl);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = width * 2;
        canvas.height = height * 2;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'mapa-mental.png';
          a.click();
          URL.revokeObjectURL(url);
        });
      };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
    }

    // Toggle editor panel
    let panelCollapsed = false;
    function togglePanel() {
      panelCollapsed = !panelCollapsed;
      const editor = document.getElementById('editor');
      editor.classList.toggle('collapsed', panelCollapsed);
      const btn = document.getElementById('btn-toggle-panel');
      setLucideIcon(btn, panelCollapsed ? 'chevron-right' : 'chevron-left');
      btn.title = panelCollapsed ? 'Expandir painel' : 'Retrair painel';
      setTimeout(() => mm.fit(), 300);
    }

    document.getElementById('md-input').addEventListener('input', update);
    update();
    refreshLucideIcons();
  </script>
</body>
</html>
